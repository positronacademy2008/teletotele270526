name: RSS Feed to WordPress Bot (Groq AI)

on:
  schedule:
    - cron: '0 */2 * * *' # Har 2 ghante mein automatic chalega
  workflow_dispatch:
    inputs:
      delete_last:
        description: 'Force Test: Delete last.txt to process old feed items as new?'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Test Mode Option: Agar checkbox tick kiya toh last.txt delete ho jayegi
    - name: Handle Test Mode (Delete last.txt)
      if: ${{ github.event.inputs.delete_last == 'true' }}
      run: |
        rm -f last.txt
        echo "✅ Test Mode Active: last.txt deleted successfully!"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 openai pikepdf

    - name: Run Positron Core Bot
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        WP_URL: ${{ secrets.WP_URL }}
        WP_USER: ${{ secrets.WP_USER }}
        WP_PASS: ${{ secrets.WP_PASS }}
        FEED_URL: ${{ secrets.FEED_URL }}
      run: python bot.py

    - name: Save State (Commit last.txt)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        touch last.txt
        git add last.txt
        git diff-index --quiet HEAD || (git commit -m "Update last.txt state" && git pull --rebase origin main && git push)
