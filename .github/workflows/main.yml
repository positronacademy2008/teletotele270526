name: Telegram Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: "2/5 * * * *"

concurrency:
  group: telegram-auto-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DEST_CHANNEL: ${{ secrets.DEST_CHANNEL }}
          FEED_URL: ${{ secrets.FEED_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          DB_FILE: bot_state.sqlite3
          MAX_ITEMS_PER_RUN: "5"
          MAX_RETRIES: "3"
          WP_POST_TYPE: pages
          WP_TIMEOUT: "25"
          WP_MAX_RETRIES: "2"
          WP_SKIP_EXISTING: "true"
          SOURCE_PAGE_HOSTS: indianaukrihelp.com
          SKIP_MESSAGE_PHRASES: "शिक्षा विभाग समाचार"
          WEB_FOLLOW_LINE: "📢 Follow TELEGRAM WHATSAPP https://whatsapp.com/channel/0029VaZYv1G1noz4mprmxQ0q | TELEGRAM https://t.me/RAJASTHAN_TODAY"
          BRAND_IMAGES: "true"
          IMAGE_BRAND_NAME: POSITRON ACADEMY
          IMAGE_BRAND_ADDRESS: "चौधरी के पास हॉस्पिटल, पांसल चौराहा,भीलवाड़ा"
          IMAGE_BRAND_CONTACT: "8104894648"
          FOLLOW_LINE_TG: ""
          FOLLOW_LINE_WA: ""
          FOLLOW_LINE: ""
        run: python bot.py

      - name: Commit SQLite state
        if: always()
        run: |
          if [ -f bot_state.sqlite3 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bot_state.sqlite3
            git commit -m "Update bot sqlite state" || true
            git pull --rebase || true
            git push || true
          else
            echo "bot_state.sqlite3 not found, nothing to commit"
          fi
