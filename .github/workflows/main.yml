name: Telegram Auto Post

on:
  workflow_dispatch:
    inputs:
      clean_previous_run:
        description: "Manual test ke liye — pehle wala bot state (bot_state.sqlite3) delete karke fresh run karein"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "2/5 * * * *"

concurrency:
  group: telegram-auto-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Diagnose source feed and destination channel
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DEST_CHANNEL: ${{ secrets.DEST_CHANNEL }}
          FEED_URL: https://tg.i-c-a.su/rss/ShikshaNewsRajasthan
          WP_URL: https://positronacademy.in
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          SKIP_WORDPRESS: "false"
        run: python diagnose.py

      - name: Clean previous bot state
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.clean_previous_run }}
        run: |
          if [ -f bot_state.sqlite3 ]; then
            rm -f bot_state.sqlite3
            echo "Removed bot_state.sqlite3 — fresh manual test run will start."
          else
            echo "No bot_state.sqlite3 found; already clean."
          fi

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DEST_CHANNEL: ${{ secrets.DEST_CHANNEL }}
          FEED_URL: https://tg.i-c-a.su/rss/ShikshaNewsRajasthan
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WP_URL: https://positronacademy.in
          WP_REFERER: https://positronacademy.in/wp-admin/
          SKIP_WORDPRESS: "false"
          MAX_RUN_SECONDS: "360"
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          DB_FILE: bot_state.sqlite3
          MAX_ITEMS_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.clean_previous_run && '1' || '5' }}
          ITEM_DELAY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.clean_previous_run && '15' || '3' }}
          FLOOD_MAX_RETRIES: "8"
          MAX_RETRIES: "3"
          WP_POST_TYPE: ${{ secrets.WP_POST_TYPE || 'pages' }}
          WP_TIMEOUT: "45"
          WP_MAX_RETRIES: "3"
          ACADEMY_WEBSITE: "https://positronacademy.in"
          IMAGE_BRAND_ADDRESS_LATIN: "चौधरी के पास हॉस्पिटल, पांसल चौराहा,भीलवाड़ा"
          WP_SKIP_EXISTING: "true"
          WP_UPLOAD_MEDIA: "false"
          MAX_SOURCE_PAGES_PER_ITEM: "1"
          FETCH_SOURCE_FOR_LINKS: "true"
          PAGE_BUILD_MODE: digest
          SOURCE_PAGE_HOSTS: indianaukrihelp.com
          SKIP_MESSAGE_PHRASES: "शिक्षा विभाग समाचार"
          WEB_FOLLOW_LINE: "📢 Follow TELEGRAM WHATSAPP https://whatsapp.com/channel/0029VaZYv1G1noz4mprmxQ0q | TELEGRAM https://t.me/RAJASTHAN_TODAY"
          BRAND_IMAGES: "false"
          IMAGE_BRAND_NAME: POSITRON ACADEMY
          IMAGE_BRAND_ADDRESS: "चौधरी के पास हॉस्पिटल, पांसल चौराहा,भीलवाड़ा"
          IMAGE_BRAND_CONTACT: "8104894648"
          FOLLOW_LINE_TG: ""
          FOLLOW_LINE_WA: ""
          FOLLOW_LINE: ""
        run: python run_bot.py

      - name: Commit SQLite state
        if: always()
        run: |
          if [ -f bot_state.sqlite3 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bot_state.sqlite3
            if git diff --cached --quiet; then
              echo "bot_state.sqlite3 unchanged, nothing to commit"
            else
              git commit -m "Update bot sqlite state"
              git push origin HEAD:main || true
            fi
          else
            echo "bot_state.sqlite3 not found, nothing to commit"
          fi
