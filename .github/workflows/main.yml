name: Telegram Bot Feed Fetcher
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot Script
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        DEST_CHANNEL: ${{ secrets.DEST_CHANNEL }}
        FEED_URL: ${{ secrets.FEED_URL }}
        FOLLOW_LINE: ${{ secrets.FOLLOW_LINE }}
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USER }}
        FTP_PASS: ${{ secrets.FTP_PASS }}
        MY_DOMAIN: ${{ secrets.MY_DOMAIN }}
        FTP_DIR: ${{ secrets.FTP_DIR }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python bot.py

    - name: Commit state
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # File exist karti hai toh add karein, nahi toh ignore
        git add last.txt || echo "last.txt not found, skipping."
        git diff-index --quiet HEAD || (git commit -m "Update last.txt" && git push)
