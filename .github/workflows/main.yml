name: Telegram Bot Feed Fetcher

on:
  schedule:
    - cron: '*/30 * * * *' # Har 30 minute mein chalega
  workflow_dispatch: # Manual run ke liye button dega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot Script
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        DEST_CHANNEL: ${{ secrets.DEST_CHANNEL }}
        FEED_URL: ${{ secrets.FEED_URL }}
        FOLLOW_LINE: ${{ secrets.FOLLOW_LINE }}
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USER }}
        FTP_PASS: ${{ secrets.FTP_PASS }}
        MY_DOMAIN: ${{ secrets.MY_DOMAIN }}
        FTP_DIR: ${{ secrets.FTP_DIR }}
      run: python bot.py

    - name: Commit state (last.txt)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add last.txt
        # Agar last.txt change hui hai tabhi commit karega
        git diff-index --quiet HEAD || git commit -m "Update last.txt"
        git push
