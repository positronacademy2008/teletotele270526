name: Telegram Bot Feed Fetcher

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

   
      - name: Test AI Connection
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python test_ai.py

    - name: Commit state (last.txt)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        touch last.txt
        git add last.txt
        # Error se bachne ke liye pehle pull aur phir push
        git diff-index --quiet HEAD || (git commit -m "Update last.txt" && git pull --rebase origin main && git push)
